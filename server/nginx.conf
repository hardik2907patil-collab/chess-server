worker_processes auto;

events {
    # Match the 1000 CCU requirement + overhead
    worker_connections 2048;
    # Optimize connection processing
    multi_accept on;
    use epoll; # (on Linux, Nginx will fallback to whatever is best on Windows)
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Basic performance tuning
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    
    # 1. KEEPALIVE & TIMEOUTS
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;

    # 2. RATE LIMITING
    # Define a rate limit zone based on client IP: 10 requests per second
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # Define a connection limit zone based on client IP: 5 simultaneous connections
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstream Node.js server
    upstream node_backend {
        server 127.0.0.1:3000;
        
        # Keepalive connections to the Node backend
        keepalive 64;
    }

    server {
        listen       80;
        server_name  localhost; # Replace with production domain

        # 3. BUFFERING & PAYLOAD SIZES
        client_max_body_size 1k; # Chess moves are tiny, drop large payloads maliciously sent
        client_body_buffer_size 1k;
        client_header_buffer_size 1k;
        large_client_header_buffers 2 1k;

        # 4. WEBSOCKET PROXY WITH CONNECTION BACKLOG
        location /socket.io/ {
            # Apply Rate Limiting
            # Burst=20 allows short connection spikes, nodelay processes them immediately if within burst
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 5;

            proxy_pass http://node_backend;

            # WebSocket upgrade headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Forward real IP
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Extended timeouts for long-lived Socket.IO connections
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;

            # Buffering adjustments for real-time WebSockets
            proxy_buffering off;
        }

        # Static file hosting (client)
        location / {
            root   ../client; # Path relative to nginx or absolute path to client folder
            index  index.html;

            # Cache static assets
            expires 1d;
            add_header Cache-Control "public, no-transform";
            
            # Rate limit static file requests too
            limit_req zone=api_limit burst=50 nodelay;
        }

        # Handle errors gracefully
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
